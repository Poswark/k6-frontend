<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gráfica de k6</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
</head>
<body>
    <h2>Gráfica de Métricas de k6</h2>
    <div id="grafico" style="width:100%; height:500px;"></div>

    <script>
        fetch("/Users/giovannyorjuelamelo/Documents/Laboratorio/Frontend-k6/k6/test.json")
            .then(response => response.json())
            .then(data => {
                // Extraer datos relevantes (modificar según tu JSON)
                let timestamps = data.metrics.http_req_duration.values.map((_, i) => i);
                let values = data.metrics.http_req_duration.values;

                let trace = {
                    x: timestamps,
                    y: values,
                    mode: 'lines+markers',
                    type: 'scatter',
                    name: 'Duración HTTP (ms)'
                };

                let layout = {
                    title: 'Duración de solicitudes HTTP en k6',
                    xaxis: { title: 'Número de solicitud' },
                    yaxis: { title: 'Tiempo (ms)' }
                };

                Plotly.newPlot('grafico', [trace], layout);
            })
            .catch(error => console.error("Error cargando el JSON:", error));
    </script>
</body>
</html>
